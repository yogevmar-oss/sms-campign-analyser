  <h1 style="font-size:22px;font-weight:600;color:#16161A;margin:0 0 8px 0;line-height:1.3;">מתי H&M עושה סייל?</h1>
  <p style="font-size:14px;color:#52525B;margin:0;line-height:1.65;">הזמן הכי טוב לקנות ב-אייץ' אנד אם: מבצעי אמצע עונה וינואר–מרץ (קלירנס חורף) — עד 50% הנחה. הנחות שגרתיות עומדות על כ-25%. כרגע לא חלון סייל — כדאי לחכות לספטמבר.</p>
